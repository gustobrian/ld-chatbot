<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L&D Training Request Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f0f4f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #1e5799 0%, #2989d8 50%, #207cca 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .header-buttons {
      display: flex;
      gap: 12px;
    }

    .header-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .header-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .header-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .header-btn.generate-btn {
      background: rgba(76, 175, 80, 0.3);
      border-color: rgba(76, 175, 80, 0.6);
    }

    .header-btn.generate-btn:hover:not(:disabled) {
      background: rgba(76, 175, 80, 0.5);
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
      white-space: pre-wrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: #2989d8;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #f0f4f8;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      background: #f0f4f8;
      color: #666;
      align-self: flex-start;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #2989d8;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-container {
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #e0e6ed;
      display: flex;
      gap: 12px;
    }

    .input-container input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e6ed;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-container input:focus {
      border-color: #2989d8;
    }

    .input-container input:disabled {
      background: #f5f5f5;
    }

    .send-btn {
      background: #2989d8;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .send-btn:hover:not(:disabled) {
      background: #1e5799;
    }

    .send-btn:disabled {
      background: #a0c4e8;
      cursor: not-allowed;
    }

    .welcome-message {
      text-align: center;
      color: #666;
      padding: 40px;
    }

    .welcome-message h2 {
      color: #2989d8;
      margin-bottom: 8px;
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e0e6ed;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.25rem;
      color: #1a1a2e;
    }

    .priority-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.875rem;
      color: white;
    }

    .priority-badge.P0 { background: #dc3545; }
    .priority-badge.P1 { background: #fd7e14; }
    .priority-badge.P2 { background: #2989d8; }
    .priority-badge.P3 { background: #6c757d; }

    .email-status {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .email-status.sent {
      background: #d4edda;
      color: #155724;
    }

    .email-status.not-sent {
      background: #fff3cd;
      color: #856404;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
      padding: 4px 8px;
    }

    .modal-close:hover {
      color: #1a1a2e;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .document-content {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #1a1a2e;
    }

    .document-content h1,
    .document-content h2,
    .document-content h3 {
      margin-top: 24px;
      margin-bottom: 12px;
      color: #1e5799;
    }

    .document-content h1:first-child,
    .document-content h2:first-child {
      margin-top: 0;
    }

    .document-content p {
      margin-bottom: 12px;
    }

    .document-content ul, .document-content ol {
      margin-left: 24px;
      margin-bottom: 12px;
    }

    .document-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.875rem;
    }

    .document-content th,
    .document-content td {
      border: 1px solid #e0e6ed;
      padding: 10px 12px;
      text-align: left;
    }

    .document-content th {
      background: #f0f4f8;
      font-weight: 600;
    }

    .document-content tr:nth-child(even) {
      background: #fafbfc;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #e0e6ed;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn.primary {
      background: #2989d8;
      color: white;
      border: none;
    }

    .modal-btn.primary:hover {
      background: #1e5799;
    }

    .modal-btn.secondary {
      background: white;
      color: #2989d8;
      border: 1px solid #2989d8;
    }

    .modal-btn.secondary:hover {
      background: #f0f4f8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>L&D Training Request Assistant</h1>
    <div class="header-buttons">
      <button class="header-btn generate-btn" id="generateBtn" onclick="generateDocument()" disabled>
        Generate Design Document
      </button>
      <button class="header-btn" onclick="startNewRequest()">Start New Request</button>
    </div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome-message">
        <h2>Welcome!</h2>
        <p>Click "Start New Request" to begin submitting a training design request.</p>
      </div>
    </div>

    <div class="input-container">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        onkeypress="handleKeyPress(event)"
        disabled
      >
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <!-- Document Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Training Design Document</h2>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span class="email-status" id="emailStatus"></span>
          <span class="priority-badge" id="priorityBadge">P2</span>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="document-content" id="documentContent"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn secondary" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="modal-btn primary" onclick="downloadDocument()">Download as .txt</button>
      </div>
    </div>
  </div>

  <script>
    let sessionId = null;
    let isWaiting = false;
    let documentText = '';

    async function startNewRequest() {
      const messagesDiv = document.getElementById('messages');
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const generateBtn = document.getElementById('generateBtn');

      // Clear messages and reset state
      messagesDiv.innerHTML = '';
      generateBtn.disabled = true;

      // Create new session
      try {
        const response = await fetch('/api/session', { method: 'POST' });
        const data = await response.json();
        sessionId = data.sessionId;

        // Enable input
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();

        // Get initial greeting with streaming
        const greetingResponse = await fetch('/api/greeting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });

        // Create message element for streaming greeting
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant';
        messagesDiv.appendChild(messageDiv);

        let fullGreeting = '';
        const reader = greetingResponse.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.text) {
                  fullGreeting += data.text;
                  messageDiv.textContent = fullGreeting;
                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
              } catch (e) {}
            }
          }
        }
      } catch (error) {
        console.error('Error starting new request:', error);
        hideTypingIndicator();
        addMessage('Sorry, there was an error connecting to the server. Please try again.', 'assistant');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();

      if (!message || !sessionId || isWaiting) return;

      // Add user message
      addMessage(message, 'user');
      input.value = '';

      // Show typing indicator
      isWaiting = true;
      showTypingIndicator();
      document.getElementById('sendBtn').disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message })
        });

        hideTypingIndicator();

        // Create message element for streaming
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message assistant';
        messagesDiv.appendChild(messageDiv);

        let fullMessage = '';
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.text) {
                  fullMessage += data.text;
                  messageDiv.textContent = fullMessage;
                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else if (data.error) {
                  messageDiv.textContent = 'Sorry, there was an error. Please try again.';
                }
              } catch (e) {}
            }
          }
        }

        checkForDocumentTrigger(fullMessage);
      } catch (error) {
        console.error('Error sending message:', error);
        hideTypingIndicator();
        addMessage('Sorry, there was an error connecting to the server.', 'assistant');
      }

      isWaiting = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function checkForDocumentTrigger(message) {
      const lowerMessage = message.toLowerCase();
      const triggers = [
        'generate the design document',
        'shall i generate',
        'ready to generate',
        'create the design document',
        'generate a design document',
        'would you like me to generate',
        'i can generate',
        'proceed with generating',
        'thank you for your request'
      ];

      if (triggers.some(trigger => lowerMessage.includes(trigger))) {
        document.getElementById('generateBtn').disabled = false;
      }
    }

    function addMessage(text, role) {
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.textContent = text;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingIndicator() {
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message typing';
      typingDiv.id = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTypingIndicator() {
      const typingDiv = document.getElementById('typing-indicator');
      if (typingDiv) {
        typingDiv.remove();
      }
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    async function generateDocument() {
      const generateBtn = document.getElementById('generateBtn');
      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';

      try {
        const response = await fetch('/api/generate-document', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });

        const data = await response.json();

        if (data.document) {
          documentText = data.document;
          showModal(data.document, data.priorityTier, data.emailSent);
        } else {
          alert('Failed to generate document. Please try again.');
        }
      } catch (error) {
        console.error('Error generating document:', error);
        alert('Failed to generate document. Please try again.');
      }

      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Design Document';
    }

    function showModal(doc, priorityTier, emailSent) {
      const modal = document.getElementById('modalOverlay');
      const content = document.getElementById('documentContent');
      const badge = document.getElementById('priorityBadge');
      const emailStatus = document.getElementById('emailStatus');

      // Set priority badge
      badge.textContent = priorityTier;
      badge.className = `priority-badge ${priorityTier}`;

      // Set email status
      if (emailSent) {
        emailStatus.textContent = 'Email sent to L&D team';
        emailStatus.className = 'email-status sent';
      } else {
        emailStatus.textContent = 'Email not configured';
        emailStatus.className = 'email-status not-sent';
      }

      // Convert markdown to HTML
      content.innerHTML = markdownToHtml(documentText);

      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function closeModalOnOverlay(event) {
      if (event.target.id === 'modalOverlay') {
        closeModal();
      }
    }

    function markdownToHtml(md) {
      // Convert markdown tables to HTML
      let html = md;

      // Handle tables
      const tableRegex = /\|(.+)\|\n\|[-|\s]+\|\n((\|.+\|\n?)+)/g;
      html = html.replace(tableRegex, (match, header, body) => {
        const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Line breaks
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');

      // Wrap in paragraph
      if (!html.startsWith('<')) {
        html = '<p>' + html + '</p>';
      }

      return html;
    }

    function copyToClipboard() {
      navigator.clipboard.writeText(documentText).then(() => {
        alert('Document copied to clipboard!');
      }).catch(err => {
        console.error('Failed to copy:', err);
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = documentText;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('Document copied to clipboard!');
      });
    }

    function downloadDocument() {
      const blob = new Blob([documentText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `training-design-document-${new Date().toISOString().split('T')[0]}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
